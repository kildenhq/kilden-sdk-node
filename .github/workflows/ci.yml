name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: kilden-runners
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: kildenhq/kilden-sdk-spec
          path: spec
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: spec/mockserver/go.mod
      - run: npm ci
      # Warm the Go build cache: the test harness starts the spec mock server
      # with `go run`, and a cold compile blows its 30s startup deadline on the
      # lab runners (the hosted image shipped Go prebuilt and warm).
      - run: go build ./...
        working-directory: spec/mockserver
      - run: npm run check
        env:
          KILDEN_SPEC_DIR: ${{ github.workspace }}/spec
      - run: npm run build
